<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fly High - Star Collector</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-overlay">
        <div id="score">Score: 0</div>
        <div id="message" class="hidden"></div>
    </div>
    <!-- Mobile touch controls (hidden on desktop) -->
    <div id="mobile-controls">
        <div id="mobile-left">
            <button class="touch-btn" id="btn-left">◀</button>
        </div>
        <div id="mobile-right">
            <button class="touch-btn" id="btn-right">▶</button>
        </div>
        <button class="touch-btn touch-btn-large" id="btn-thrust">▲</button>
        <button class="touch-btn" id="btn-down">▼</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
